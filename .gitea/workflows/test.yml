name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff

      - name: Lint (syntax errors + pyflakes)
        run: ruff check .

      - name: Run tests
        # PYTHONPATH shadows lancedb with .gitea/ci_stubs/lancedb.py: the real
        # native extension needs AVX2 and SIGILLs on this runner's CPU, and the
        # suite mocks VectorStoreManager everywhere — only the import must work.
        run: PYTHONPATH=.gitea/ci_stubs pytest tests/ -q
